<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Event Review</title>

        <link rel="stylesheet" href="css/admin-event-review.css">
        <link rel="stylesheet" href="css/darkmode.css">
    </head>

    <body>
        <nav class="navbar">
            <div class="nav-left">
                <div><img class="logo" src="img/WhatsUpDLSULogo.png" alt="Logo"></div>
                <span class="logo-text"> WhatsUpDLSU </span>
            </div>

            <div class="nav-right">
                <div class="nav-links">
                    <a href="admin-dashboard.html" class="nav-tab active"> Manage Events </a>
                    <a href="account-management.html" class="nav-tab"> Account Management </a>
                </div>

                <div class="profile-section">
                    <button class="profile-btn" id="profileBtn"> Moderator ▼ </button>

                    <div class="dropdown-menu" id="dropdownMenu">
                        <button class="dark-mode-btn"> DARK/LIGHT MODE </button>
                        <button onclick="window.location.href='../login-side-main/admin-login.html'"> LOG OUT </button>
                    </div>
                </div>
            </div>
        </nav>


        <main class="review-page">
            <aside class="action-panel">
                <button class="back-btn" onclick="location.href='admin-dashboard.html'"> Back </button>

                <div class="remarks-section">
                    <h3>Remarks</h3>
                    <textarea placeholder="Enter remarks here..."></textarea>
                </div>

                <button class="approve-btn" id="approveBtn"> Approve </button>
                <button class="reject-btn" id="rejectBtn"> Reject </button>
            </aside>

            <section class="event-panel">
                <div class="event-info">
                    <h1>Animusika</h1>

                    <div class="details">
                        <p><strong>Category:</strong> Arts & Culture</p>
                        <p><strong>Duration:</strong> 8:00 AM - 6:00 PM</p>
                        <p><strong>Venue:</strong> Henry Sy Hall</p>
                        <p><strong>Status:</strong> Upcoming</p>
                        <p><strong>Registration:</strong> Open</p>
                        <p><strong>Organizer:</strong> DLSU USG</p>
                    </div>

                    <div class="description">
                        <h3>Description:</h3>
                        <p> The Quick Brown Fox Jumps Over The Lazy Dog </p>
                    </div>
                </div>

                <div class="image-column">
                    <div class="carousel image-carousel">
                        <div class="carousel-track" id="imageTrack"></div>
                        <button class="carousel-btn prev" id="imgPrev">&#10094;</button>
                        <button class="carousel-btn next" id="imgNext">&#10095;</button>
                        <div class="carousel-dots" id="imageDots"></div>
                    </div>
                </div>
            </section>
        </main>

        <script src="js/admin-event-review.js"></script>
        <script src="js/darkmode.js"></script>

    </body>
</html>
