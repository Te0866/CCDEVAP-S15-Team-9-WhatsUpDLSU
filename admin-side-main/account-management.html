<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Account Management</title>

        <link rel="stylesheet" href="css/account-management.css">
        <link rel="stylesheet" href="css/darkmode.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <nav class="navbar">
            <div class="nav-left">
                <div><img class="logo" src="img/WhatsUpDLSULogo.png" alt="Logo"></div>
                <span class="logo-text"> WhatsUpDLSU </span>
            </div>

            <div class="nav-right">
                <div class="nav-links">
                    <a href="admin-dashboard.html" class="nav-tab"> Manage Events </a>
                    <a href="account-management.html" class="nav-tab active"> Account Management </a>
                </div>

                <div class="profile-section">
                    <button class="profile-btn" id="profileBtn"> Moderator ▼ </button>

                    <div class="dropdown-menu" id="dropdownMenu">
                        <button class="dark-mode-btn"> DARK/LIGHT MODE </button>
                        <button onclick="window.location.href='../login-side-main/admin-login.html'"> LOG OUT </button>
                    </div>
                </div>
            </div>
        </nav>

        <section class="page-header">
            <h1>Account Management</h1>

            <div class="header-actions">
                <button class="add-user-btn" onclick="location.href='add-user.html'"> + Add User </button>
                <button class="create-org-btn" onclick="location.href='admin-create.html'"> + Create Organization </button>
            </div>
        </section>

        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search Accounts" class="search-input">

            <select class="filter-box" id="typeFilter">
                <option value="all">All Accounts</option>
                <option value="student">Students</option>
                <option value="organization">Officers/Organizations</option>
            </select>
        </section>

        <main class="users-container">
            <div class="table-wrapper">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Account Type</th>
                            <th>Date Added</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="usersTableBody">
                        <tr class="user-row" data-type="student">
                            <td data-label="Name">Juan Dela Cruz</td>
                            <td data-label="Account Type"><span class="type-badge student">Student</span></td>
                            <td data-label="Date Added">June 1, 2026</td>
                            <td data-label="Actions" class="actions-cell">
                                <button class="edit-btn" onclick="location.href='add-user.html?id=1'"> Edit </button>
                                <button class="delete-btn"> Delete </button>
                            </td>
                        </tr>

                        <tr class="user-row" data-type="student">
                            <td data-label="Name">Maria Santos</td>
                            <td data-label="Account Type"><span class="type-badge student">Student</span></td>
                            <td data-label="Date Added">June 5, 2026</td>
                            <td data-label="Actions" class="actions-cell">
                                <button class="edit-btn" onclick="location.href='add-user.html?id=2'"> Edit </button>
                                <button class="delete-btn"> Delete </button>
                            </td>
                        </tr>

                        <tr class="user-row" data-type="organization">
                            <td data-label="Name">DLSU USG</td>
                            <td data-label="Account Type"><span class="type-badge organization">Officer/Organization</span></td>
                            <td data-label="Date Added">June 8, 2026</td>
                            <td data-label="Actions" class="actions-cell">
                                <button class="edit-btn" onclick="location.href='admin-create.html?id=3'"> Edit </button>
                                <button class="delete-btn"> Delete </button>
                            </td>
                        </tr>

                        <tr class="user-row" data-type="organization">
                            <td data-label="Name">Computer Society</td>
                            <td data-label="Account Type"><span class="type-badge organization">Officer/Organization</span></td>
                            <td data-label="Date Added">June 12, 2026</td>
                            <td data-label="Actions" class="actions-cell">
                                <button class="edit-btn" onclick="location.href='admin-create.html?id=4'"> Edit </button>
                                <button class="delete-btn"> Delete </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <script src="js/account-management.js"></script>
        <script src="js/darkmode.js"></script>

    </body>
</html>
