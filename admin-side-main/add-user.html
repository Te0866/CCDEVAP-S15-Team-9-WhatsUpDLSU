<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Add User</title>

        <link rel="stylesheet" href="css/add-user.css">
        <link rel="stylesheet" href="css/darkmode.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <nav class="navbar">
            <div class="nav-left">
                <div><img class="logo" src="img/WhatsUpDLSULogo.png" alt="Logo"></div>
                <span class="logo-text"> WhatsUpDLSU </span>
            </div>

            <div class="nav-right">
                <div class="nav-links">
                    <a href="admin-dashboard.html" class="nav-tab"> Manage Events </a>
                    <a href="account-management.html" class="nav-tab active"> Account Management </a>
                </div>

                <div class="profile-section">
                    <button class="profile-btn" id="profileBtn"> Moderator ▼ </button>

                    <div class="dropdown-menu" id="dropdownMenu">
                        <button class="dark-mode-btn"> DARK/LIGHT MODE </button>
                        <button onclick="window.location.href='../login-side-main/admin-login.html'"> LOG OUT </button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="top-bar">
            <button class="back-btn" onclick="location.href='account-management.html'"> Back to Account Management </button>
        </div>

        <main class="create-page">
            <h1 class="form-title" id="formTitle">Add User</h1>

            <div class="form-container">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="usernameInput" placeholder="Enter username">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="passwordInput" placeholder="Enter password">
                    </div>
                </div>
            </div>

            <button class="create-btn" id="createBtn"> Create User </button>
        </main>

        <script src="js/add-user.js"></script>
        <script src="js/darkmode.js"></script>

    </body>
</html>
