<!DOCTYPE html>
<html lang="en">
<head>
    <title>WhatsUpDLSU - Create Account</title>

    <link rel="stylesheet" href="css/create-account.css">
</head>
<body>
    <main class="register-page">
        <h1 class="site-title">WhatsUpDLSU</h1>
        <p class="site-description">
            Create your student account to receive updates on university events,
            organization activities, workshops, seminars, and campus announcements.
        </p>
        <div class="register-container">
            <h2>Create Account</h2>
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Input Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="juan.delacruz@dlsu.edu.ph">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="password123">
                </div>
                <button type="submit" class="create-btn"> CREATE ACCOUNT </button>
            </form>
        </div>
        <a href="student-login.html" class="login-link"> Back to Login </a>
    </main>
</body>
</html>
