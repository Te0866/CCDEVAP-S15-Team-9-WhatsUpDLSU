<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsUpDLSU - Create Account</title>

    <link rel="stylesheet" href="css/create-account.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div>
                <img class="logo" src="img/WhatsUpDLSULogo.png" alt="Logo">
            </div>
            <span class="logo-text">WhatsUpDLSU</span>
        </div>
    </header>

    <main class="page-wrap">

        <div class="page-header">
            <a href="login.html" class="back-btn">◀ Login</a>
            <h1>Create Account</h1>
            <span class="spacer"></span>
        </div>

        <p class="page-description">
            Create your student account to receive updates on university events,
            organization activities, workshops, seminars, and campus announcements.
        </p>

        <form id="registerForm" novalidate>

            <section class="card">
                <h2 class="card-title">Account Information</h2>

                <div class="form-group">
                    <label for="name">Full Name <span class="tag tag-required">Required</span></label>
                    <input type="text" id="name" name="name" placeholder="Juan Dela Cruz" required>
                </div>

                <div class="form-group">
                    <label for="username">Username <span class="tag tag-required">Required</span></label>
                    <input type="text" id="username" name="username" placeholder="juandelacruz" required>
                </div>
            </section>

            <section class="card">
                <h2 class="card-title">Security</h2>

                <div class="form-group">
                    <label for="password">Password <span class="tag tag-required">Required</span></label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" placeholder="Enter password" required minlength="8">
                        <button type="button" class="toggle-visibility" data-target="password">Show</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="tag tag-required">Required</span></label>
                    <div class="password-field">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required>
                        <button type="button" class="toggle-visibility" data-target="confirmPassword">Show</button>
                    </div>
                    <p id="matchMessage" class="hint">Must match the password above.</p>
                </div>
            </section>

            <div class="form-actions">
                <a href="login.html" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </div>

        </form>

    </main>

    <script src="js/create-account.js"></script>
</body>
</html>
